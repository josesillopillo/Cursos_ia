<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | AI Master</title>
    <meta name="description" content="Tu perfil y cursos en AI Master.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AI<span>Master</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#cursos">Cursos</a></li>
            <li><a href="profiles.html">Comunidad</a></li>
            <li><a href="perfil.html" class="active">Mi Perfil</a></li>
        </ul>
        <div class="nav-actions">
            <div id="nav-user-dropdown" class="user-dropdown">
                <button id="dropdown-toggle" class="btn-secondary dropdown-btn">
                    <span id="nav-user-name">Usuario</span>
                    <span class="dropdown-arrow">&#9662;</span>
                </button>
                <div id="dropdown-menu" class="dropdown-menu hidden">
                    <a href="perfil.html" class="dropdown-item">Mi Perfil</a>
                    <a href="profiles.html" class="dropdown-item">Comunidad</a>
                    <hr class="dropdown-divider">
                    <button id="nav-logout-link" class="dropdown-item logout-item">Cerrar Sesion</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="profile-container" id="profile-container">
        <div class="profile-banner skeleton-card" style="padding:2rem"><div class="profile-avatar skeleton" style="width:96px;height:96px;border-radius:50%"></div><div style="flex:1"><div class="skeleton skeleton-title" style="width:50%;height:28px;margin-bottom:0.5rem"></div><div class="skeleton skeleton-text" style="width:40%"></div><div class="skeleton skeleton-text short" style="width:25%;margin-top:0.5rem"></div></div></div>
        <div class="stats-grid">${[1,2,3,4].map(() => '<div class="stat-card" style="padding:1.5rem"><div class="skeleton skeleton-title" style="width:40%;height:28px;margin:0 auto 0.5rem"></div><div class="skeleton skeleton-text short" style="width:60%;margin:0 auto"></div></div>').join('')}</div>
        <div class="category-progress-section"><div class="skeleton skeleton-title" style="width:30%;height:22px;margin-bottom:1rem"></div>${[1,2,3,4,5,6].map(() => '<div class="category-progress-card" style="padding:1rem 1.5rem"><div class="cat-bar-wrapper"><div class="skeleton" style="width:100%;height:8px;border-radius:4px"></div></div></div>').join('')}</div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 AI Master. Proyecto Universitario de Arquitectura DevOps.</p>
    </footer>

    <div id="toast-container"></div>

    <script src="js/perfil.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
