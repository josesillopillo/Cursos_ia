<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curso | AI Master</title>
    <meta name="description" content="Detalle del curso en AI Master.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6d28d9">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">AI<span>Master</span></div>
        <ul class="nav-links">
            <li><a href="index.html">Inicio</a></li>
            <li><a href="index.html#cursos">Cursos</a></li>
            <li><a href="profiles.html">Comunidad</a></li>
            <li><a href="perfil.html" id="nav-perfil-link">Mi Perfil</a></li>
        </ul>
        <div class="nav-actions">
            <div id="nav-user-dropdown" class="user-dropdown hidden">
                <button id="dropdown-toggle" class="btn-secondary dropdown-btn">
                    <span id="nav-user-name">Usuario</span>
                    <span class="dropdown-arrow">&#9662;</span>
                </button>
                <div id="dropdown-menu" class="dropdown-menu hidden">
                    <a href="perfil.html" class="dropdown-item">Mi Perfil</a>
                    <a href="profiles.html" class="dropdown-item">Comunidad</a>
                    <hr class="dropdown-divider">
                    <button id="nav-logout-link" class="dropdown-item logout-item">Cerrar Sesion</button>
                </div>
            </div>
            <button id="nav-login-btn" class="btn-primary" onclick="window.location.href='index.html'">Iniciar Sesion</button>
        </div>
    </nav>

    <main class="profile-container" id="curso-container">
        <div class="profile-banner skeleton-card" style="padding:2rem">
            <div class="skeleton" style="width:64px;height:64px;border-radius:12px"></div>
            <div style="flex:1">
                <div class="skeleton skeleton-title" style="width:60%;height:32px;margin-bottom:0.5rem"></div>
                <div class="skeleton skeleton-text" style="width:40%"></div>
                <div class="skeleton skeleton-text short" style="width:20%;margin-top:0.5rem"></div>
            </div>
        </div>
        <div class="stats-grid">${[1,2,3].map(() => '<div class="stat-card" style="padding:1.5rem"><div class="skeleton skeleton-title" style="width:40%;height:28px;margin:0 auto 0.5rem"></div><div class="skeleton skeleton-text short" style="width:60%;margin:0 auto"></div></div>').join('')}</div>
        <div style="margin-top:1rem"><div class="skeleton" style="width:100%;height:200px;border-radius:16px"></div></div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 AI Master. Proyecto Universitario de Arquitectura DevOps.</p>
    </footer>

    <div id="toast-container"></div>

    <script src="js/curso.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {});
            });
        }
    </script>
</body>
</html>
