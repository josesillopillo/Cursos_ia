services:
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    ports:
      - "8081:80"
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    ports:
      - "4000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      POSTGRES_USER: ${POSTGRES_USER:-administrador}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
      POSTGRES_DB: ${POSTGRES_DB:-ia_courses_db}
      POSTGRES_HOST: database
      POSTGRES_PORT: 5432
      CORS_ORIGIN: http://localhost:8081
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  database:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-administrador}
      POSTGRES_DB: ${POSTGRES_DB:-ia_courses_db}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Database password is required}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-administrador} -d ${POSTGRES_DB:-ia_courses_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ia-cursos.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - database
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
