apiVersion: v1
kind: Secret
metadata:
  name: infisical-credentials
  namespace: ia-courses
type: Opaque
stringData:
  client-id: ""   # <-- Reemplazar con INFISICAL_CLIENT_ID
  client-secret: "" # <-- Reemplazar con INFISICAL_CLIENT_SECRET
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: infisical-store
  namespace: ia-courses
spec:
  provider:
    infisical:
      host: https://app.infisical.com
      auth:
        universalAuth:
          clientId:
            name: infisical-credentials
            key: client-id
          clientSecret:
            name: infisical-credentials
            key: client-secret
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: ia-courses
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: infisical-store
    kind: SecretStore
  target:
    name: app-secrets
    creationPolicy: Merge
  data:
    - secretKey: jwt-secret
      remoteRef:
        key: JWT_SECRET
    - secretKey: postgres-user
      remoteRef:
        key: POSTGRES_USER
    - secretKey: postgres-password
      remoteRef:
        key: POSTGRES_PASSWORD
    - secretKey: postgres-db
      remoteRef:
        key: POSTGRES_DB
