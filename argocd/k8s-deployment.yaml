apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ia-courses
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tu-usuario/ia-courses.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ia-courses
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - ApplyOutOfSyncOnly=true
  ignoreDifferences:
  - group: apps
    kind: Deployment
    jsonPointers:
    - /spec/replicas
